version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: edulearn-postgres
    environment:
      POSTGRES_DB: edulearn
      POSTGRES_USER: edulearn_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/02-database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/init-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edulearn_user -d edulearn"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
