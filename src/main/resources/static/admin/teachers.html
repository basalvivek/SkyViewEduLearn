<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EduLearn — Admin Teachers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --nav:#1a3a5c;--nav-hover:rgba(255,255,255,0.1);--nav-active:rgba(255,255,255,0.18);
  --accent:#2563a8;--accent-light:#e8f0fc;
  --green:#0f5940;--green-light:#e4f5ee;
  --amber:#92400e;--amber-light:#fef3c7;
  --red:#991b1b;--red-light:#fee2e2;
  --surface:#ffffff;--bg:#f4f6fa;--border:#e2e6ee;
  --text:#1a1f2e;--muted:#6b7385;--small:#9399a8;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);display:flex;height:100vh;overflow:hidden;}
nav{width:220px;background:var(--nav);display:flex;flex-direction:column;flex-shrink:0;height:100vh;}
.nav-brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.nav-brand svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.8;}
.nav-brand-name{font-family:'DM Serif Display',serif;font-size:17px;color:#fff;line-height:1;}
.nav-brand-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px;}
.nav-section{padding:14px 14px 4px;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:9px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.65);border:none;background:transparent;width:calc(100% - 16px);text-align:left;font-family:'DM Sans',sans-serif;transition:background 0.15s,color 0.15s;text-decoration:none;}
.nav-item svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;flex-shrink:0;}
.nav-item:hover{background:var(--nav-hover);color:#fff;}
.nav-item.active{background:var(--nav-active);color:#fff;font-weight:500;}
.nav-scroll{flex:1;overflow-y:auto;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.breadcrumb{font-size:13px;color:var(--muted);}
.breadcrumb b{color:var(--text);font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.tb-icon-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);position:relative;transition:background 0.15s,color 0.15s;}
.tb-icon-btn:hover{background:var(--bg);color:var(--text);}
.tb-icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid #fff;display:none;}
.tb-divider{width:1px;height:24px;background:var(--border);margin:0 4px;}
.user-pill{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 6px;border-radius:999px;border:1px solid var(--border);background:var(--surface);cursor:pointer;position:relative;transition:background 0.15s;}
.user-pill:hover{background:var(--bg);}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.user-pill-name{font-size:13px;font-weight:500;color:var(--text);}
.user-pill-role{font-size:10px;color:var(--muted);}
.user-pill-chevron{width:14px;height:14px;fill:none;stroke:var(--small);stroke-width:2;flex-shrink:0;transition:transform 0.15s;}
.user-pill.open .user-pill-chevron{transform:rotate(180deg);}
.dropdown{position:absolute;top:calc(100% + 8px);right:0;width:220px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.1);z-index:999;display:none;overflow:hidden;}
.dropdown.show{display:block;}
.dd-header{padding:12px 14px;border-bottom:1px solid var(--border);}
.dd-name{font-size:13px;font-weight:600;color:var(--text);}
.dd-email{font-size:11px;color:var(--small);margin-top:1px;}
.dd-role-chip{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--accent-light);color:var(--accent);margin-top:6px;}
.dd-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:background 0.12s;}
.dd-item:hover{background:var(--bg);}
.dd-item svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;color:var(--muted);}
.dd-sep{height:1px;background:var(--border);margin:4px 0;}
.dd-item.danger{color:var(--red);}
.dd-item.danger svg{color:var(--red);}
.dd-item.danger:hover{background:var(--red-light);}
.notif-panel{position:absolute;top:calc(100% + 8px);right:0;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.1);z-index:999;display:none;}
.notif-panel.show{display:block;}
.np-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);}
.np-title{font-size:13px;font-weight:600;color:var(--text);}
.np-clear{font-size:11px;color:var(--accent);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;}
.np-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.np-item:last-child{border-bottom:none;}
.np-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;}
.np-dot.read{background:transparent;border:1.5px solid var(--border);}
.np-msg{font-size:12px;color:var(--text);line-height:1.5;}
.np-time{font-size:11px;color:var(--small);margin-top:2px;}
.np-empty{padding:20px;text-align:center;font-size:12px;color:var(--small);}
.content{flex:1;overflow-y:auto;padding:28px;}
.section-hd{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.section-actions{display:flex;gap:8px;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:28px;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);text-align:left;}
td{font-size:13px;color:var(--text);padding:10px 14px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafbff;}
.tch-avatar{width:30px;height:30px;border-radius:50%;background:#3b5bdb;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.tch-cell{display:flex;align-items:center;gap:10px;}
.tch-name{font-size:13px;font-weight:500;color:var(--text);}
.tch-email{font-size:11px;color:var(--small);}
.btn-xs{padding:3px 10px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;border-radius:6px;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--muted);}
.btn-xs:hover{background:var(--bg);}
.btn-xs.danger{border-color:#fca5a5;color:var(--red);}
.btn-xs.danger:hover{background:var(--red-light);}
.btn-primary{padding:8px 18px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;border:none;border-radius:9px;cursor:pointer;color:#fff;background:var(--accent);transition:opacity 0.15s;}
.btn-primary:hover{opacity:0.88;}
.btn-secondary{padding:8px 14px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;border:1.5px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);cursor:pointer;}
.btn-secondary:hover{background:var(--bg);}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.filter-input{height:34px;padding:0 11px;font-size:12px;font-family:'DM Sans',sans-serif;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);outline:none;min-width:240px;}
.filter-input:focus{border-color:var(--accent);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:800;display:none;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);padding:24px;width:500px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 48px rgba(0,0,0,0.15);}
.modal-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:18px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-bottom:4px;}
.form-input{width:100%;height:36px;padding:0 11px;font-size:13px;font-family:'DM Sans',sans-serif;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,168,0.08);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:14px;border-top:1px solid var(--border);margin-top:4px;}
.empty-msg{text-align:center;padding:24px;color:var(--small);font-size:13px;}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;z-index:9999;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.15);}
.toast.success{background:#0f5940;}
.toast.error{background:#991b1b;}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <svg viewBox="0 0 24 24"><path d="M12 3L2 8l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <div><div class="nav-brand-name">EduLearn</div><div class="nav-brand-sub">Admin Portal</div></div>
  </div>
  <div class="nav-scroll">
    <div class="nav-section">Main</div>
    <a class="nav-item" href="/admin/dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>

</nav>

<div class="main">
  <div class="topbar">
    <div class="breadcrumb">Admin <b>Teachers</b></div>
    <div class="topbar-right">
      <div style="position:relative">
        <button class="tb-icon-btn" id="notifBtn" title="Notifications" onclick="toggleNotif()">
          <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="notif-dot" id="notifDot"></span>
        </button>
        <div class="notif-panel" id="notifPanel">
          <div class="np-header"><span class="np-title">Notifications</span><button class="np-clear" onclick="clearNotifs()">Mark all read</button></div>
          <div id="notifList"><div class="np-empty">Loading…</div></div>
        </div>
      </div>
      <div class="tb-divider"></div>
      <div style="position:relative">
        <div class="user-pill" id="userPill" onclick="toggleUserMenu()">
          <div class="user-avatar" id="topbarAvatar">AD</div>
          <div><div class="user-pill-name" id="topbarName">Admin</div><div class="user-pill-role">Administrator</div></div>
          <svg class="user-pill-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="dropdown" id="userDropdown">
          <div class="dd-header"><div class="dd-name" id="ddName">Admin</div><div class="dd-email" id="ddEmail"></div><div class="dd-role-chip">Administrator</div></div>
          <div class="dd-sep"></div>
          <div class="dd-item danger" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</div>
        </div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="section-hd">
      <span>Teachers</span>
      <div class="section-actions">
        <button class="btn-primary" style="font-size:12px;padding:6px 14px" onclick="openTeacherModal()">+ Add Teacher</button>
      </div>
    </div>
    <div class="filter-bar">
      <input class="filter-input" id="searchInput" placeholder="Search by name or email…" oninput="loadTeachers()"/>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Teacher</th><th>Job Title</th><th>Department</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
        <tbody id="teacherTableBody"><tr><td colspan="6" class="empty-msg">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add/Edit Teacher Modal -->
<div class="modal-bg" id="teacherModalBg" onclick="closeTeacherModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="teacherModalTitle">Add Teacher</div>
    <input type="hidden" id="teacherId"/>
    <div class="form-group"><label class="form-label">Full name <span style="color:#ef4444">*</span></label><input class="form-input" id="teacherName" placeholder="e.g. Jane Smith"/></div>
    <div class="form-group"><label class="form-label">Email address <span style="color:#ef4444">*</span></label><input class="form-input" id="teacherEmail" type="email" placeholder="e.g. jane@school.ac.uk"/></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Job title</label><input class="form-input" id="teacherJobTitle" placeholder="e.g. Head of English"/></div>
      <div class="form-group"><label class="form-label">Department</label><input class="form-input" id="teacherDepartment" placeholder="e.g. Languages"/></div>
    </div>
    <div class="form-group"><label class="form-label">Password <span style="color:var(--small);font-weight:400">(leave blank to auto-generate)</span></label><input class="form-input" id="teacherPassword" type="password" placeholder="Set temporary password…"/></div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeTeacherModal()">Cancel</button>
      <button class="btn-primary" onclick="saveTeacher()" id="saveTeacherBtn">Add Teacher</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script>
if(!requireAuth('ADMIN')){}
initUserDisplay();
const _n=getName();
document.getElementById('topbarName').textContent=_n||'Admin';
document.getElementById('ddName').textContent=_n||'Admin';
document.getElementById('ddEmail').textContent=getEmail?.()||'';
document.getElementById('topbarAvatar').textContent=(_n||'Admin').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

function toggleUserMenu(){const d=document.getElementById('userDropdown'),p=document.getElementById('userPill');d.classList.toggle('show');p.classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('#userPill'))document.getElementById('userDropdown').classList.remove('show');if(!e.target.closest('#notifBtn')&&!e.target.closest('#notifPanel'))document.getElementById('notifPanel').classList.remove('show');});
function logout(){sessionStorage.clear();window.location.href='/login.html';}

function toggleNotif(){document.getElementById('notifPanel').classList.toggle('show');loadNotifs();}
async function loadNotifs(){try{const r=await apiGet('/notifications?page=0&size=10');const items=r?.data||[];const el=document.getElementById('notifList');if(!items.length){el.innerHTML='<div class="np-empty">No notifications</div>';return;}el.innerHTML=items.map(n=>`<div class="np-item${n.read?'':' unread'}"><div class="np-dot${n.read?' read':''}"></div><div><div class="np-msg">${esc(n.message||'')}</div><div class="np-time">${fmtDate(n.createdAt)}</div></div></div>`).join('');const unread=items.filter(n=>!n.read).length;document.getElementById('notifDot').style.display=unread?'block':'none';}catch(e){}}
async function clearNotifs(){try{await apiPut('/notifications/read-all',{});document.getElementById('notifDot').style.display='none';}catch(e){}}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function initials(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+(type==='error'?'error':'success');t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3200);}

async function loadTeachers(){
  const tbody=document.getElementById('teacherTableBody');
  const search=document.getElementById('searchInput').value.trim().toLowerCase();
  try{
    const r=await apiGet('/teachers');
    let items=r?.data||[];
    if(search)items=items.filter(t=>(t.fullName||'').toLowerCase().includes(search)||(t.email||'').toLowerCase().includes(search));
    if(!items.length){tbody.innerHTML='<tr><td colspan="6" class="empty-msg">No teachers found</td></tr>';return;}
    tbody.innerHTML=items.map(t=>`<tr>
      <td><div class="tch-cell"><div class="tch-avatar">${initials(t.fullName)}</div><div><div class="tch-name">${esc(t.fullName)}</div><div class="tch-email">${esc(t.email)}</div></div></div></td>
      <td>${esc(t.jobTitle||'—')}</td>
      <td>${esc(t.department||'—')}</td>
      <td><span style="font-size:11px;font-weight:600;color:${t.isActive!==false?'var(--green)':'var(--muted)'}">${t.isActive!==false?'Active':'Inactive'}</span></td>
      <td>${fmtDate(t.createdAt)}</td>
      <td>
        <button class="btn-xs" onclick="editTeacher(${JSON.stringify(t).replace(/"/g,'&quot;')})">Edit</button>
        <button class="btn-xs" onclick="resetPassword('${t.id}')">Reset pw</button>
        <button class="btn-xs danger" onclick="deactivateTeacher('${t.id}')">Deactivate</button>
      </td>
    </tr>`).join('');
  }catch(e){tbody.innerHTML='<tr><td colspan="6" class="empty-msg">Could not load teachers</td></tr>';}
}

function openTeacherModal(t){
  document.getElementById('teacherId').value=t?.id||'';
  document.getElementById('teacherName').value=t?.fullName||'';
  document.getElementById('teacherEmail').value=t?.email||'';
  document.getElementById('teacherJobTitle').value=t?.jobTitle||'';
  document.getElementById('teacherDepartment').value=t?.department||'';
  document.getElementById('teacherPassword').value='';
  document.getElementById('teacherModalTitle').textContent=t?'Edit Teacher':'Add Teacher';
  document.getElementById('saveTeacherBtn').textContent=t?'Save changes':'Add Teacher';
  document.getElementById('teacherModalBg').classList.add('show');
}
function closeTeacherModal(e){if(!e||e.target===document.getElementById('teacherModalBg'))document.getElementById('teacherModalBg').classList.remove('show');}
function editTeacher(t){openTeacherModal(t);}

async function saveTeacher(){
  const id=document.getElementById('teacherId').value;
  const fullName=document.getElementById('teacherName').value.trim();
  const email=document.getElementById('teacherEmail').value.trim();
  if(!fullName||!email){showToast('Name and email required','error');return;}
  const pw=document.getElementById('teacherPassword').value.trim();
  const payload={fullName,email,jobTitle:document.getElementById('teacherJobTitle').value.trim()||null,department:document.getElementById('teacherDepartment').value.trim()||null};
  if(pw)payload.temporaryPassword=pw;
  try{
    if(id)await apiPut('/teachers/'+id,payload);
    else await apiPost('/teachers',payload);
    showToast(id?'Teacher updated':'Teacher added');
    closeTeacherModal();
    loadTeachers();
  }catch(e){showToast('Save failed: '+(e.message||''),'error');}
}

async function resetPassword(id){
  if(!confirm('Generate a new temporary password for this teacher?'))return;
  try{
    const r=await apiPut('/teachers/'+id+'/reset-password',{});
    const pw=r?.data?.temporaryPassword||'(see server logs)';
    alert('New temporary password: '+pw);
  }catch(e){showToast('Failed','error');}
}

async function deactivateTeacher(id){
  if(!confirm('Deactivate this teacher account?'))return;
  try{await apiPut('/teachers/'+id+'/deactivate',{});showToast('Teacher deactivated');loadTeachers();}catch(e){showToast('Failed','error');}
}

loadTeachers();
</script>
</body>
</html>
