<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EduLearn — My Exams</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --nav:#0e7490;--nav-hover:rgba(255,255,255,0.1);--nav-active:rgba(255,255,255,0.18);
  --accent:#0891b2;--accent-light:#ecfeff;
  --green:#0f5940;--green-light:#e4f5ee;
  --amber:#92400e;--amber-light:#fef3c7;
  --red:#991b1b;--red-light:#fee2e2;
  --surface:#ffffff;--bg:#f4f6fa;--border:#e2e6ee;
  --text:#1a1f2e;--muted:#6b7385;--small:#9399a8;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);display:flex;height:100vh;overflow:hidden;}
nav{width:210px;background:var(--nav);display:flex;flex-direction:column;flex-shrink:0;height:100vh;}
.nav-brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.08);}
.nav-brand svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:1.8;}
.nav-brand-name{font-family:'DM Serif Display',serif;font-size:17px;color:#fff;line-height:1;}
.nav-brand-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:1px;}
.nav-section{padding:14px 14px 4px;font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:rgba(255,255,255,0.3);}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:9px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.65);border:none;background:transparent;width:calc(100% - 16px);text-align:left;font-family:'DM Sans',sans-serif;transition:background 0.15s,color 0.15s;text-decoration:none;}
.nav-item svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;flex-shrink:0;}
.nav-item:hover{background:var(--nav-hover);color:#fff;}
.nav-item.active{background:var(--nav-active);color:#fff;font-weight:500;}
.nav-badge{margin-left:auto;background:rgba(255,255,255,0.18);color:#fff;font-size:10px;padding:1px 7px;border-radius:999px;font-weight:600;}
.nav-scroll{flex:1;overflow-y:auto;}
.nav-bottom{padding:12px;border-top:1px solid rgba(255,255,255,0.08);}
.nav-user{display:flex;align-items:center;gap:8px;padding:8px;border-radius:9px;cursor:pointer;}
.nav-user:hover{background:var(--nav-hover);}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0;}
.nav-user-name{font-size:12px;font-weight:500;color:#fff;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.nav-user-role{font-size:10px;color:rgba(255,255,255,0.5);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.breadcrumb{font-size:13px;color:var(--muted);}
.breadcrumb b{color:var(--text);font-weight:500;}
.topbar-right{display:flex;align-items:center;gap:6px;}
.tb-icon-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);position:relative;}
.tb-icon-btn:hover{background:var(--bg);}
.tb-icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid #fff;display:none;}
.tb-divider{width:1px;height:24px;background:var(--border);margin:0 4px;}
.user-pill{display:flex;align-items:center;gap:8px;padding:5px 10px 5px 6px;border-radius:999px;border:1px solid var(--border);background:var(--surface);cursor:pointer;position:relative;}
.user-pill:hover{background:var(--bg);}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;flex-shrink:0;}
.user-pill-name{font-size:13px;font-weight:500;color:var(--text);}
.user-pill-role{font-size:10px;color:var(--muted);}
.user-pill-chevron{width:14px;height:14px;fill:none;stroke:var(--small);stroke-width:2;flex-shrink:0;transition:transform 0.15s;}
.user-pill.open .user-pill-chevron{transform:rotate(180deg);}
.dropdown{position:absolute;top:calc(100% + 8px);right:0;width:220px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.1);z-index:999;display:none;overflow:hidden;}
.dropdown.show{display:block;}
.dd-header{padding:12px 14px;border-bottom:1px solid var(--border);}
.dd-name{font-size:13px;font-weight:600;color:var(--text);}
.dd-role-chip{display:inline-flex;font-size:10px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--accent-light);color:var(--accent);margin-top:6px;}
.dd-item{display:flex;align-items:center;gap:10px;padding:9px 14px;font-size:13px;color:var(--text);cursor:pointer;transition:background 0.12s;}
.dd-item:hover{background:var(--bg);}
.dd-item svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;color:var(--muted);}
.dd-sep{height:1px;background:var(--border);margin:4px 0;}
.dd-item.danger{color:var(--red);}
.dd-item.danger svg{color:var(--red);}
.dd-item.danger:hover{background:var(--red-light);}
.notif-panel{position:absolute;top:calc(100% + 8px);right:0;width:320px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.1);z-index:999;display:none;}
.notif-panel.show{display:block;}
.np-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);}
.np-title{font-size:13px;font-weight:600;color:var(--text);}
.np-clear{font-size:11px;color:var(--accent);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;}
.np-item{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;}
.np-item:last-child{border-bottom:none;}
.np-item:hover,.np-item.unread{background:#f0fdfe;}
.np-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;}
.np-dot.read{background:transparent;border:1.5px solid var(--border);}
.np-msg{font-size:12px;color:var(--text);line-height:1.5;}
.np-time{font-size:11px;color:var(--small);margin-top:2px;}
.np-empty{padding:20px;text-align:center;font-size:12px;color:var(--small);}
.content{flex:1;overflow-y:auto;padding:28px;}
.page-heading{font-family:'DM Serif Display',serif;font-size:22px;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.tab-bar{display:flex;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:3px;margin-bottom:24px;width:fit-content;}
.tab-btn{padding:8px 20px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;border:none;border-radius:8px;cursor:pointer;color:var(--muted);background:transparent;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.tab-btn.active{background:var(--accent);color:#fff;font-weight:600;}
.tab-count{font-size:10px;font-weight:700;padding:1px 6px;border-radius:999px;background:rgba(255,255,255,0.25);}
.tab-count.inactive{background:var(--bg);color:var(--muted);}
/* Exam cards */
.exam-list{display:flex;flex-direction:column;gap:12px;}
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;transition:box-shadow 0.15s;}
.exam-card:hover{box-shadow:0 3px 14px rgba(0,0,0,0.07);}
.ec-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px;}
.ec-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.3;}
.ec-status{font-size:10px;font-weight:600;padding:3px 10px;border-radius:999px;flex-shrink:0;}
.es-active{background:#dcfce7;color:#166534;}
.es-upcoming{background:var(--accent-light);color:var(--accent);}
.es-closed{background:#f3f4f6;color:var(--small);}
.es-pass{background:var(--green-light);color:var(--green);}
.es-fail{background:var(--red-light);color:var(--red);}
.es-pending{background:var(--amber-light);color:var(--amber);}
.ec-desc{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
.ec-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);}
.meta-item svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;}
.ec-footer{display:flex;align-items:center;justify-content:space-between;}
.ec-score{font-size:20px;font-weight:700;color:var(--text);}
.ec-score.pass{color:var(--green);}
.ec-score.fail{color:var(--red);}
.ec-progress{flex:1;margin:0 16px;}
.prog-label{font-size:11px;color:var(--small);margin-bottom:4px;}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;}
.btn-action{padding:8px 18px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;border:none;border-radius:9px;cursor:pointer;color:#fff;background:var(--accent);}
.btn-action:hover{opacity:0.88;}
.btn-action:disabled{opacity:0.4;cursor:not-allowed;background:var(--muted);}
.btn-outline{padding:7px 16px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;border:1.5px solid var(--border);border-radius:9px;cursor:pointer;color:var(--muted);background:transparent;}
.btn-outline:hover{background:var(--bg);}
.empty-state{text-align:center;padding:56px 24px;color:var(--small);}
.empty-state svg{width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5;margin-bottom:12px;}
.empty-state p{font-size:14px;}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;z-index:9999;display:none;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">
    <svg viewBox="0 0 24 24"><path d="M12 3L2 8l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <div><div class="nav-brand-name">EduLearn</div><div class="nav-brand-sub">Student Portal</div></div>
  </div>
  <div class="nav-scroll">
    <div class="nav-section">My Learning</div>
    <a class="nav-item" href="/student/dashboard.html"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
    <a class="nav-item active" href="/student/exams.html"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>My Exams</a>
    <a class="nav-item" href="/student/results.html"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>My Results</a>
    <div class="nav-section">Communication</div>
    <a class="nav-item" href="/student/announcements.html"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Announcements</a>
  </div>
  <div class="nav-bottom">
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar">ST</div>
      <div style="min-width:0"><div class="nav-user-name" id="navName">Student</div><div class="nav-user-role">Student</div></div>
    </div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="breadcrumb">Student <b>My Exams</b></div>
    <div class="topbar-right">
      <div style="position:relative">
        <button class="tb-icon-btn" id="notifBtn" onclick="toggleNotif()"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot" id="notifDot"></span></button>
        <div class="notif-panel" id="notifPanel"><div class="np-header"><span class="np-title">Notifications</span><button class="np-clear" onclick="clearNotifs()">Mark all read</button></div><div id="notifList"><div class="np-empty">Loading…</div></div></div>
      </div>
      <div class="tb-divider"></div>
      <div style="position:relative">
        <div class="user-pill" id="userPill" onclick="toggleUserMenu()">
          <div class="user-avatar" id="topbarAvatar">ST</div>
          <div><div class="user-pill-name" id="topbarName">Student</div><div class="user-pill-role">Student</div></div>
          <svg class="user-pill-chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="dropdown" id="userDropdown">
          <div class="dd-header"><div class="dd-name" id="ddName">Student</div><div class="dd-role-chip">Student</div></div>
          <div class="dd-sep"></div>
          <div class="dd-item danger" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out</div>
        </div>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="page-heading">My Exams</div>
    <div class="page-sub">All your exams — active now, upcoming, and completed.</div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tabActive" onclick="switchTab('active')">
        Active Now <span class="tab-count" id="countActive">0</span>
      </button>
      <button class="tab-btn" id="tabUpcoming" onclick="switchTab('upcoming')">
        Upcoming <span class="tab-count inactive" id="countUpcoming">0</span>
      </button>
      <button class="tab-btn" id="tabCompleted" onclick="switchTab('completed')">
        Completed <span class="tab-count inactive" id="countCompleted">0</span>
      </button>
    </div>

    <div id="examList"><div class="empty-state"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><p>Loading…</p></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script>
if (!requireAuth('STUDENT')) { throw new Error('auth'); }
const uname = getName();
const initials = (uname||'ST').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
document.getElementById('topbarName').textContent = uname||'Student';
document.getElementById('ddName').textContent = uname||'Student';
document.getElementById('topbarAvatar').textContent = initials;
document.getElementById('navAvatar').textContent = initials;
document.getElementById('navName').textContent = uname||'Student';

function toggleUserMenu(){document.getElementById('userDropdown').classList.toggle('show');document.getElementById('userPill').classList.toggle('open');}
function toggleNotif(){document.getElementById('notifPanel').classList.toggle('show');if(document.getElementById('notifPanel').classList.contains('show'))loadNotifs();}
document.addEventListener('click',e=>{if(!e.target.closest('#userPill')&&!e.target.closest('#userDropdown')){document.getElementById('userDropdown').classList.remove('show');document.getElementById('userPill').classList.remove('open');}if(!e.target.closest('#notifBtn')&&!e.target.closest('#notifPanel'))document.getElementById('notifPanel').classList.remove('show');});
async function loadNotifs(){const list=document.getElementById('notifList');try{const r=await apiGet('/notifications?page=0&size=10');const items=r?.data||[];list.innerHTML=items.length?items.map(n=>`<div class="np-item ${n.read?'':'unread'}"><span class="np-dot ${n.read?'read':''}"></span><div><div class="np-msg">${esc(n.message)}</div><div class="np-time">${timeAgo(n.createdAt)}</div></div></div>`).join(''):'<div class="np-empty">No notifications</div>';}catch(e){list.innerHTML='<div class="np-empty">Could not load</div>';}}
async function clearNotifs(){try{await apiPut('/notifications/read-all',{});}catch(e){}}

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.style.display='block';setTimeout(()=>{t.style.display='none';},3000);}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeAgo(iso){if(!iso)return '';const diff=Date.now()-new Date(iso).getTime();const m=Math.floor(diff/60000);if(m<1)return 'just now';if(m<60)return m+' min ago';const h=Math.floor(m/60);if(h<24)return h+' hr ago';return Math.floor(h/24)+' d ago';}
function fmtDateTime(iso){if(!iso)return '—';return new Date(iso).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fmtDate(iso){if(!iso)return '—';return new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}

let allData = {active:[],upcoming:[],completed:[]};
let curTab = 'active';

async function loadAll(){
  try{
    const [a,u,c] = await Promise.all([
      apiGet('/student/exams/active'),
      apiGet('/student/exams/upcoming'),
      apiGet('/student/exams/completed')
    ]);
    allData.active = a?.data||[];
    allData.upcoming = u?.data||[];
    allData.completed = c?.data||[];
    document.getElementById('countActive').textContent = allData.active.length;
    document.getElementById('countUpcoming').textContent = allData.upcoming.length;
    document.getElementById('countCompleted').textContent = allData.completed.length;
    renderTab();
  }catch(e){
    document.getElementById('examList').innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><p>Could not load exams</p></div>';
  }
}

function switchTab(tab){
  curTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
  ['active','upcoming','completed'].forEach(t=>{
    const cnt=document.getElementById('count'+t.charAt(0).toUpperCase()+t.slice(1));
    cnt.className='tab-count'+(t===tab?'':' inactive');
  });
  renderTab();
}

function renderTab(){
  const list = document.getElementById('examList');
  const items = allData[curTab];
  if(!items.length){
    const msgs = {active:'No active exams right now',upcoming:'No upcoming exams scheduled',completed:'No completed exams yet'};
    list.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg><p>${msgs[curTab]}</p></div>`;
    return;
  }
  list.innerHTML = '<div class="exam-list">'+items.map(e=>renderCard(e)).join('')+'</div>';
}

function renderCard(e){
  const now = new Date();
  const start = new Date(e.startAt);
  const end = new Date(e.endAt);

  if(curTab === 'active'){
    const isInProgress = e.attemptStatus === 'IN_PROGRESS';
    const pct = isInProgress && e.questionCount > 0 ? Math.round((e.answeredCount||0)/e.questionCount*100) : 0;
    const btnLabel = isInProgress ? 'Continue →' : 'Start exam →';
    const btnAction = isInProgress ? `resumeExam('${e.attemptId}')` : `startExam('${e.scheduleId}')`;
    return `<div class="exam-card">
      <div class="ec-top"><div class="ec-name">${esc(e.examName)}</div><span class="ec-status es-active">● Live Now</span></div>
      ${e.examDescription?`<div class="ec-desc">${esc(e.examDescription)}</div>`:''}
      <div class="ec-meta">
        <span class="meta-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${e.timeLimitMins} min</span>
        <span class="meta-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>${e.questionCount||0} questions</span>
        ${e.passMark?`<span class="meta-item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Pass: ${e.passMark}%</span>`:''}
        <span class="meta-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Ends ${fmtDateTime(e.endAt)}</span>
      </div>
      <div class="ec-footer">
        ${isInProgress?`<div class="ec-progress"><div class="prog-label">${e.answeredCount||0} / ${e.questionCount||0} answered</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div>`:'<div></div>'}
        <button class="btn-action" onclick="${btnAction}">${btnLabel}</button>
      </div>
    </div>`;
  }

  if(curTab === 'upcoming'){
    const daysUntil = Math.ceil((start - now) / 86400000);
    const countdown = daysUntil <= 0 ? 'Starting soon' : daysUntil === 1 ? 'Starts tomorrow' : `Starts in ${daysUntil} days`;
    return `<div class="exam-card">
      <div class="ec-top"><div class="ec-name">${esc(e.examName)}</div><span class="ec-status es-upcoming">Upcoming</span></div>
      ${e.examDescription?`<div class="ec-desc">${esc(e.examDescription)}</div>`:''}
      <div class="ec-meta">
        <span class="meta-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${e.timeLimitMins} min</span>
        <span class="meta-item"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>${e.questionCount||0} questions</span>
        ${e.passMark?`<span class="meta-item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>Pass: ${e.passMark}%</span>`:''}
        <span class="meta-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${fmtDateTime(e.startAt)} – ${fmtDateTime(e.endAt)}</span>
      </div>
      <div class="ec-footer">
        <span style="font-size:12px;font-weight:600;color:var(--accent)">${countdown}</span>
        <button class="btn-action" disabled>Not started</button>
      </div>
    </div>`;
  }

  // Completed
  const pct = e.percentage != null ? Math.round(e.percentage) : null;
  const isPassed = e.isPassed;
  const pending = pct == null;
  const statusCls = pending ? 'es-pending' : isPassed ? 'es-pass' : 'es-fail';
  const statusLabel = pending ? 'Marking' : isPassed ? '✓ Passed' : '✗ Failed';
  return `<div class="exam-card">
    <div class="ec-top"><div class="ec-name">${esc(e.examName)}</div><span class="ec-status ${statusCls}">${statusLabel}</span></div>
    <div class="ec-meta">
      <span class="meta-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${e.timeLimitMins} min</span>
      <span class="meta-item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Submitted ${fmtDate(e.submittedAt)}</span>
    </div>
    <div class="ec-footer">
      ${pct != null ? `<div class="ec-score ${isPassed?'pass':'fail'}">${pct}%</div>` : `<div style="font-size:13px;color:var(--amber)">Awaiting marks</div>`}
      ${e.attemptId ? `<button class="btn-outline" onclick="viewResult('${e.attemptId}')">View results</button>` : '<div></div>'}
    </div>
  </div>`;
}

async function startExam(scheduleId){
  if(!confirm('Ready to start? The timer will begin immediately.'))return;
  try{
    const r = await apiPost('/student/attempts',{scheduleId});
    const id = r?.data?.id;
    if(id){sessionStorage.setItem('currentAttemptId',id);window.location.href='/student/exam.html?attemptId='+id;}
    else showToast('Could not start exam','error');
  }catch(e){showToast('Error starting exam','error');}
}

function resumeExam(id){sessionStorage.setItem('currentAttemptId',id);window.location.href='/student/exam.html?attemptId='+id;}
function viewResult(id){window.location.href='/student/exam.html?result=true&attemptId='+id;}

loadAll();
</script>
</body>
</html>
