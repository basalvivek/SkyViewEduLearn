<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EduLearn — Exam</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --accent:#4f46e5;--accent-light:#eef2ff;
  --green:#0f5940;--green-light:#e4f5ee;
  --red:#991b1b;--red-light:#fee2e2;
  --amber:#92400e;--amber-light:#fef3c7;
  --surface:#ffffff;--bg:#f4f6fa;--border:#e2e6ee;
  --text:#1a1f2e;--muted:#6b7385;--small:#9399a8;
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
/* ── Top bar ── */
.exam-topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.exam-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px;}
.timer-wrap{display:flex;align-items:center;gap:8px;}
.timer-icon{width:18px;height:18px;fill:none;stroke:var(--muted);stroke-width:1.8;}
.timer-val{font-size:18px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;min-width:60px;}
.timer-val.warning{color:#d97706;}
.timer-val.danger{color:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.tb-right{display:flex;align-items:center;gap:8px;}
.btn-submit-top{padding:8px 18px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;border:none;border-radius:9px;cursor:pointer;color:#fff;background:var(--accent);}
.btn-submit-top:hover{opacity:0.88;}
/* ── Main layout ── */
.exam-body{flex:1;display:flex;overflow:hidden;}
/* Question navigator */
.q-sidebar{width:180px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.qs-header{padding:12px;border-bottom:1px solid var(--border);}
.qs-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);}
.qs-progress{font-size:11px;color:var(--small);margin-top:3px;}
.qs-grid{flex:1;overflow-y:auto;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:5px;align-content:start;}
.qs-grid::-webkit-scrollbar{width:3px;}
.q-nav-dot{width:100%;aspect-ratio:1;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);font-size:10px;font-weight:600;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.q-nav-dot:hover{border-color:var(--accent);color:var(--accent);}
.q-nav-dot.current{background:var(--accent);border-color:var(--accent);color:#fff;}
.q-nav-dot.answered{background:var(--green-light);border-color:var(--green);color:var(--green);}
.q-nav-dot.flagged{background:var(--amber-light);border-color:var(--amber);color:var(--amber);}
.qs-legend{padding:10px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--small);}
.legend-item{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
/* Main question area */
.q-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.q-header{padding:16px 24px;border-bottom:1px solid var(--border);flex-shrink:0;}
.q-num{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);margin-bottom:6px;}
.q-text{font-size:16px;color:var(--text);line-height:1.6;}
.q-image{max-width:100%;max-height:200px;object-fit:contain;border-radius:8px;margin-top:8px;border:1px solid var(--border);}
.q-body{flex:1;overflow-y:auto;padding:20px 24px;}
.q-body::-webkit-scrollbar{width:4px;}
.q-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
/* Answer inputs */
.option-list{display:flex;flex-direction:column;gap:8px;}
.option-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color 0.15s,background 0.15s;text-align:left;width:100%;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);}
.option-btn:hover{border-color:var(--accent);background:var(--accent-light);}
.option-btn.selected{border-color:var(--accent);background:var(--accent-light);font-weight:500;}
.option-indicator{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s;}
.option-btn.selected .option-indicator{border-color:var(--accent);background:var(--accent);}
.option-indicator svg{width:10px;height:10px;fill:none;stroke:#fff;stroke-width:3;display:none;}
.option-btn.selected .option-indicator svg{display:block;}
.checkbox-indicator{border-radius:4px;}
.tf-row{display:flex;gap:10px;}
.tf-btn{flex:1;padding:16px;font-size:16px;font-weight:600;font-family:'DM Sans',sans-serif;border:2px solid var(--border);border-radius:10px;cursor:pointer;background:var(--surface);color:var(--text);transition:all 0.15s;}
.tf-btn:hover{border-color:var(--accent);background:var(--accent-light);}
.tf-btn.selected{border-color:var(--accent);background:var(--accent-light);}
.text-answer{width:100%;min-height:140px;padding:12px;font-size:14px;font-family:'DM Sans',sans-serif;border:2px solid var(--border);border-radius:10px;resize:vertical;outline:none;color:var(--text);background:var(--surface);}
.text-answer:focus{border-color:var(--accent);}
.code-answer{width:100%;min-height:200px;padding:12px;font-size:13px;font-family:'Courier New',monospace;border:2px solid var(--border);border-radius:10px;resize:vertical;outline:none;color:var(--text);background:#1e1e2e;color:#cdd6f4;}
.code-answer:focus{border-color:var(--accent);}
.word-count{font-size:11px;color:var(--small);margin-top:6px;text-align:right;}
/* Footer */
.q-footer{padding:14px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--surface);}
.qf-left{display:flex;align-items:center;gap:8px;}
.flag-toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;padding:5px 10px;border:1.5px solid var(--border);border-radius:8px;background:transparent;font-family:'DM Sans',sans-serif;}
.flag-toggle:hover{background:var(--amber-light);border-color:var(--amber);color:var(--amber);}
.flag-toggle.flagged{background:var(--amber-light);border-color:var(--amber);color:var(--amber);}
.flag-toggle svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;}
.qf-right{display:flex;gap:8px;}
.btn-prev{padding:9px 18px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;border:1.5px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);cursor:pointer;}
.btn-prev:hover:not(:disabled){background:var(--bg);}
.btn-prev:disabled{opacity:0.4;cursor:not-allowed;}
.btn-next{padding:9px 18px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;border:none;border-radius:9px;cursor:pointer;color:#fff;background:var(--accent);}
.btn-next:hover{opacity:0.88;}
/* Confirm modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:800;display:none;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);padding:28px;width:420px;box-shadow:0 16px 48px rgba(0,0,0,0.15);}
.modal-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:10px;}
.modal-body{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
.modal-summary{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:13px;}
.modal-summary div{margin-bottom:4px;color:var(--text);}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;}
.btn-cancel{padding:9px 16px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:500;border:1.5px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);cursor:pointer;}
.btn-confirm{padding:9px 20px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;border:none;border-radius:9px;cursor:pointer;color:#fff;background:var(--accent);}
/* Result screen */
.result-screen{display:none;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:40px;}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 40px;max-width:480px;width:100%;text-align:center;}
.result-icon{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;}
.result-icon.pass{background:var(--green-light);}
.result-icon.fail{background:var(--red-light);}
.result-icon.pending{background:var(--amber-light);}
.result-score{font-size:48px;font-weight:700;color:var(--text);font-family:'DM Serif Display',serif;margin-bottom:4px;}
.result-label{font-size:14px;color:var(--muted);margin-bottom:20px;}
.result-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.rb-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;}
.rb-val{font-size:20px;font-weight:600;color:var(--text);}
.rb-label{font-size:11px;color:var(--muted);margin-top:2px;}
.btn-home{padding:10px 24px;font-size:14px;font-family:'DM Sans',sans-serif;font-weight:600;border:none;border-radius:9px;cursor:pointer;color:#fff;background:var(--accent);}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;z-index:9999;display:none;}
.toast.success{background:#0f5940;}
.toast.error{background:#991b1b;}
</style>
</head>
<body>

<div class="exam-topbar">
  <div class="exam-title" id="examTitle">Loading exam…</div>
  <div class="timer-wrap">
    <svg class="timer-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="timer-val" id="timerVal">--:--</span>
  </div>
  <div class="tb-right">
    <button class="btn-submit-top" onclick="openSubmitModal()">Submit Exam</button>
  </div>
</div>

<div class="exam-body" id="examBody">
  <div class="q-sidebar">
    <div class="qs-header">
      <div class="qs-title">Questions</div>
      <div class="qs-progress" id="qsProgress">0 / 0 answered</div>
    </div>
    <div class="qs-grid" id="qsGrid"></div>
    <div class="qs-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Current</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--green-light);border:1px solid var(--green)"></div>Answered</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber-light);border:1px solid var(--amber)"></div>Flagged</div>
    </div>
  </div>

  <div class="q-main" id="qMain">
    <div class="q-header">
      <div class="q-num" id="qNum">Question 1 of 1</div>
      <div class="q-text" id="qText">Loading…</div>
    </div>
    <div class="q-body" id="qBody"></div>
    <div class="q-footer">
      <div class="qf-left">
        <button class="flag-toggle" id="flagBtn" onclick="toggleFlag()">
          <svg viewBox="0 0 24 24"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>
          Flag for review
        </button>
      </div>
      <div class="qf-right">
        <button class="btn-prev" id="prevBtn" onclick="navigate(-1)" disabled>← Previous</button>
        <button class="btn-next" id="nextBtn" onclick="navigate(1)">Save &amp; Next →</button>
      </div>
    </div>
  </div>
</div>

<!-- Result screen (hidden until submitted) -->
<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <div class="result-icon" id="resultIcon">🎓</div>
    <div class="result-score" id="resultScore">—</div>
    <div class="result-label" id="resultLabel">—</div>
    <div class="result-breakdown">
      <div class="rb-item"><div class="rb-val" id="rbMarks">—</div><div class="rb-label">Marks obtained</div></div>
      <div class="rb-item"><div class="rb-val" id="rbTotal">—</div><div class="rb-label">Total marks</div></div>
      <div class="rb-item"><div class="rb-val" id="rbPending">—</div><div class="rb-label">Pending manual marking</div></div>
      <div class="rb-item"><div class="rb-val" id="rbTime">—</div><div class="rb-label">Time taken</div></div>
    </div>
    <button class="btn-home" onclick="window.location.href='/student/dashboard.html'">Back to Dashboard</button>
  </div>
</div>

<!-- Submit confirm modal -->
<div class="modal-bg" id="submitModal">
  <div class="modal">
    <div class="modal-title">Submit Exam?</div>
    <div class="modal-summary" id="submitSummary"></div>
    <div class="modal-body">Once submitted you cannot change your answers.</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSubmitModal()">Go back</button>
      <button class="btn-confirm" onclick="submitExam()">Submit now</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script>
if (!requireAuth('STUDENT')) {}

const params=new URLSearchParams(location.search);
const attemptId=params.get('attemptId')||sessionStorage.getItem('currentAttemptId');
const isResult=params.get('result')==='true';

let attempt=null;
let questions=[];
let answers={};
let currentIdx=0;
let timerInterval=null;
let autoSaveInterval=null;
let startedAt=null;

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.style.display='block';setTimeout(()=>{t.style.display='none';},3000);}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

if(!attemptId){window.location.href='/student/dashboard.html';}

async function init(){
  if(isResult){await loadResult();return;}
  try{
    const r=await apiGet('/student/attempts/'+attemptId);
    attempt=r?.data||{};
    questions=attempt.questions||[];
    startedAt=new Date(attempt.startedAt||Date.now());
    document.getElementById('examTitle').textContent=attempt.examName||'Exam';
    // Pre-populate saved answers
    (attempt.answers||[]).forEach(a=>{
      answers[a.questionId]={selectedOptionIds:a.selectedOptionIds||[],booleanAnswer:a.booleanAnswer,textAnswer:a.textAnswer||'',isFlagged:a.isFlagged||false};
    });
    if(!questions.length){showToast('No questions in this exam','error');return;}
    renderQuestion();
    renderNav();
    startTimer(attempt.timeLimitMins||60);
    autoSaveInterval=setInterval(autoSave,30000);
  }catch(e){showToast('Could not load exam','error');}
}

function startTimer(totalMins){
  const now=new Date();
  const elapsed=Math.floor((now-startedAt)/1000);
  let remaining=totalMins*60-elapsed;
  if(remaining<=0){autoSubmit();return;}
  renderTimer(remaining);
  timerInterval=setInterval(()=>{
    remaining--;
    renderTimer(remaining);
    if(remaining<=0){clearInterval(timerInterval);autoSubmit();}
  },1000);
}

function renderTimer(secs){
  const tv=document.getElementById('timerVal');
  const m=Math.floor(secs/60);
  const s=secs%60;
  tv.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  tv.className='timer-val'+(secs<=300?' danger':secs<=600?' warning':'');
}

function renderQuestion(){
  const q=questions[currentIdx];
  if(!q)return;
  document.getElementById('qNum').textContent='Question '+(currentIdx+1)+' of '+questions.length;
  document.getElementById('qText').textContent=q.questionText||q.text||'';
  document.getElementById('prevBtn').disabled=currentIdx===0;
  document.getElementById('nextBtn').textContent=currentIdx===questions.length-1?'Save & Finish →':'Save & Next →';
  const a=answers[q.questionId||q.id]||{};
  const flagBtn=document.getElementById('flagBtn');
  flagBtn.classList.toggle('flagged',!!a.isFlagged);
  renderAnswerInput(q,a);
  renderNav();
  updateProgress();
}

function renderAnswerInput(q,a){
  const body=document.getElementById('qBody');
  const type=q.questionType||q.type||'';
  const qId=q.questionId||q.id;
  if(type==='MCQ_SINGLE'){
    body.innerHTML=`<div class="option-list">${(q.options||[]).map(opt=>`
      <button class="option-btn ${(a.selectedOptionIds||[]).includes(opt.id)?'selected':''}" onclick="selectMCQ('${qId}','${opt.id}',false)">
        <span class="option-indicator"><svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg></span>
        ${esc(opt.optionText||opt.text||'')}
      </button>`).join('')}</div>`;
  }else if(type==='MCQ_MULTIPLE'){
    body.innerHTML=`<p style="font-size:12px;color:var(--muted);margin-bottom:12px">Select all that apply</p><div class="option-list">${(q.options||[]).map(opt=>`
      <button class="option-btn ${(a.selectedOptionIds||[]).includes(opt.id)?'selected':''}" onclick="selectMCQ('${qId}','${opt.id}',true)">
        <span class="option-indicator checkbox-indicator"><svg viewBox="0 0 12 12"><polyline points="2 6 5 9 10 3"/></svg></span>
        ${esc(opt.optionText||opt.text||'')}
      </button>`).join('')}</div>`;
  }else if(type==='TRUE_FALSE'){
    body.innerHTML=`<div class="tf-row">
      <button class="tf-btn ${a.booleanAnswer===true?'selected':''}" onclick="selectTF('${qId}',true)">True</button>
      <button class="tf-btn ${a.booleanAnswer===false?'selected':''}" onclick="selectTF('${qId}',false)">False</button>
    </div>`;
  }else if(type==='CODE'){
    body.innerHTML=`<textarea class="code-answer" id="textInput" placeholder="Write your code here…" oninput="setTextAnswer('${qId}')">${esc(a.textAnswer||'')}</textarea>`;
  }else{
    const wordLimit=q.wordLimit?`<div class="word-count" id="wordCount">0 / ${q.wordLimit} words</div>`:'<div class="word-count" id="wordCount"></div>';
    body.innerHTML=`<textarea class="text-answer" id="textInput" placeholder="Type your answer here…" oninput="setTextAnswer('${qId}')">${esc(a.textAnswer||'')}</textarea>${wordLimit}`;
    updateWordCount(a.textAnswer||'',q.wordLimit);
  }
}

function selectMCQ(qId,optId,multi){
  if(!answers[qId])answers[qId]={selectedOptionIds:[],isFlagged:false};
  if(multi){
    const ids=answers[qId].selectedOptionIds||[];
    const idx=ids.indexOf(optId);
    if(idx>=0)ids.splice(idx,1);else ids.push(optId);
    answers[qId].selectedOptionIds=ids;
  }else{
    answers[qId].selectedOptionIds=[optId];
  }
  renderQuestion();
}

function selectTF(qId,val){
  if(!answers[qId])answers[qId]={selectedOptionIds:[],isFlagged:false};
  answers[qId].booleanAnswer=val;
  renderQuestion();
}

function setTextAnswer(qId){
  const v=document.getElementById('textInput')?.value||'';
  if(!answers[qId])answers[qId]={selectedOptionIds:[],isFlagged:false};
  answers[qId].textAnswer=v;
  const q=questions[currentIdx];
  updateWordCount(v,q?.wordLimit);
}

function updateWordCount(text,limit){
  const wc=document.getElementById('wordCount');if(!wc)return;
  const words=text.trim().split(/\s+/).filter(w=>w).length;
  wc.textContent=limit?`${words} / ${limit} words`:(words>0?`${words} words`:'');
  if(limit)wc.style.color=words>limit?'var(--red)':'var(--small)';
}

function toggleFlag(){
  const q=questions[currentIdx];const qId=q?.questionId||q?.id;
  if(!answers[qId])answers[qId]={selectedOptionIds:[],isFlagged:false};
  answers[qId].isFlagged=!answers[qId].isFlagged;
  document.getElementById('flagBtn').classList.toggle('flagged',answers[qId].isFlagged);
  renderNav();
}

function isAnswered(q,a){
  if(!a)return false;
  const type=q.questionType||q.type||'';
  if(type==='MCQ_SINGLE'||type==='MCQ_MULTIPLE')return (a.selectedOptionIds||[]).length>0;
  if(type==='TRUE_FALSE')return a.booleanAnswer!=null;
  return !!(a.textAnswer||'').trim();
}

function renderNav(){
  const grid=document.getElementById('qsGrid');
  grid.innerHTML=questions.map((q,i)=>{
    const qId=q.questionId||q.id;
    const a=answers[qId];
    let cls='q-nav-dot';
    if(i===currentIdx)cls+=' current';
    else if(a?.isFlagged)cls+=' flagged';
    else if(isAnswered(q,a))cls+=' answered';
    return `<button class="${cls}" onclick="jumpTo(${i})">${i+1}</button>`;
  }).join('');
}

function updateProgress(){
  const answered=questions.filter(q=>isAnswered(q,answers[q.questionId||q.id])).length;
  document.getElementById('qsProgress').textContent=answered+' / '+questions.length+' answered';
}

function jumpTo(idx){currentIdx=idx;renderQuestion();}

function navigate(dir){
  const newIdx=currentIdx+dir;
  if(newIdx<0||newIdx>questions.length-1)return;
  currentIdx=newIdx;
  renderQuestion();
}

async function autoSave(){
  try{
    const payload={answers:buildAnswerPayload()};
    await apiPut('/student/attempts/'+attemptId+'/answers',payload);
  }catch(e){}
}

function buildAnswerPayload(){
  return questions.map(q=>{
    const qId=q.questionId||q.id;
    const a=answers[qId]||{};
    const type=q.questionType||q.type||'';
    const entry={questionId:qId};
    if(type==='MCQ_SINGLE'||type==='MCQ_MULTIPLE')entry.selectedOptionIds=a.selectedOptionIds||[];
    else if(type==='TRUE_FALSE')entry.booleanAnswer=a.booleanAnswer;
    else entry.textAnswer=a.textAnswer||'';
    if(a.isFlagged)entry.isFlagged=true;
    return entry;
  });
}

function openSubmitModal(){
  const answered=questions.filter(q=>isAnswered(q,answers[q.questionId||q.id])).length;
  const flagged=Object.values(answers).filter(a=>a.isFlagged).length;
  const unanswered=questions.length-answered;
  document.getElementById('submitSummary').innerHTML=
    `<div><b>${answered}</b> of <b>${questions.length}</b> questions answered</div>`+
    (unanswered>0?`<div style="color:var(--amber)">⚠ ${unanswered} question${unanswered!==1?'s':''} not answered</div>`:'')+
    (flagged>0?`<div style="color:var(--amber)">🏴 ${flagged} flagged for review</div>`:'');
  document.getElementById('submitModal').classList.add('show');
}

function closeSubmitModal(){document.getElementById('submitModal').classList.remove('show');}

async function submitExam(){
  closeSubmitModal();
  clearInterval(timerInterval);clearInterval(autoSaveInterval);
  try{
    await apiPut('/student/attempts/'+attemptId+'/answers',{answers:buildAnswerPayload()});
    const r=await apiPost('/student/attempts/'+attemptId+'/submit',{});
    showResult(r?.data||{});
  }catch(e){showToast('Submit failed','error');}
}

async function autoSubmit(){
  clearInterval(timerInterval);clearInterval(autoSaveInterval);
  try{
    await apiPut('/student/attempts/'+attemptId+'/answers',{answers:buildAnswerPayload()});
    const r=await apiPost('/student/attempts/'+attemptId+'/submit',{});
    showResult(r?.data||{});
  }catch(e){showToast('Auto-submit failed — please submit manually','error');}
}

function showResult(data){
  document.getElementById('examBody').style.display='none';
  const rs=document.getElementById('resultScreen');rs.style.display='flex';
  const pct=data.percentage!=null?Math.round(data.percentage):null;
  const passed=data.isPassed;
  const pending=data.pendingManualCount||0;
  const icon=document.getElementById('resultIcon');
  if(pending>0){icon.className='result-icon pending';icon.textContent='⏳';}
  else if(passed){icon.className='result-icon pass';icon.textContent='✅';}
  else{icon.className='result-icon fail';icon.textContent='❌';}
  document.getElementById('resultScore').textContent=pct!=null?pct+'%':'Pending';
  document.getElementById('resultLabel').textContent=pending>0?'Marking in progress':passed?'Passed':'Not passed';
  document.getElementById('rbMarks').textContent=data.marksObtained!=null?data.marksObtained:'—';
  document.getElementById('rbTotal').textContent=data.totalMarks!=null?data.totalMarks:'—';
  document.getElementById('rbPending').textContent=pending;
  const elapsed=Math.floor((Date.now()-startedAt.getTime())/60000);
  document.getElementById('rbTime').textContent=elapsed+' min';
}

async function loadResult(){
  document.getElementById('examBody').style.display='none';
  document.getElementById('resultScreen').style.display='flex';
  try{
    const r=await apiGet('/student/attempts/'+attemptId+'/result');
    showResult(r?.data||{});
    document.getElementById('examTitle').textContent=r?.data?.examName||'Exam Result';
  }catch(e){showToast('Could not load result','error');}
}

init();
</script>
</body>
</html>
