<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EduLearn — Set Your Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--accent:#0891b2;--accent-dark:#0e7490;--accent-light:#ecfeff;--red:#991b1b;--red-light:#fee2e2;--surface:#fff;--bg:#f4f6fa;--border:#e2e6ee;--text:#1a1f2e;--muted:#6b7385;--small:#9399a8;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--surface);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,0.1);width:440px;overflow:hidden;}
.card-header{background:linear-gradient(135deg,var(--accent-dark),var(--accent));padding:32px 36px 28px;}
.brand{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.brand svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:1.8;}
.brand-name{font-family:'DM Serif Display',serif;font-size:18px;color:#fff;}
.header-title{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;margin-bottom:6px;}
.header-sub{font-size:13px;color:rgba(255,255,255,0.7);line-height:1.5;}
.card-body{padding:32px 36px;}
.info-box{background:var(--accent-light);border:1px solid #a5f3fc;border-radius:10px;padding:12px 14px;margin-bottom:24px;font-size:12px;color:var(--accent-dark);line-height:1.5;}
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-bottom:5px;}
.input-wrap{position:relative;}
.input-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:none;stroke:var(--small);stroke-width:1.8;pointer-events:none;}
.form-input{width:100%;height:44px;padding:0 12px 0 38px;font-size:14px;font-family:'DM Sans',sans-serif;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(8,145,178,0.12);background:#fff;}
.form-input.error{border-color:var(--red);}
.strength-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.strength-fill{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s;}
.strength-txt{font-size:10px;color:var(--small);margin-top:3px;}
.rule-list{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.rule{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--small);}
.rule.ok{color:#0f5940;}
.rule svg{width:12px;height:12px;flex-shrink:0;}
.error-msg{font-size:12px;color:var(--red);background:var(--red-light);border:1px solid #fca5a5;border-radius:8px;padding:8px 12px;margin-bottom:14px;display:none;}
.submit-btn{width:100%;height:46px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;border:none;border-radius:var(--radius);color:#fff;cursor:pointer;background:linear-gradient(135deg,var(--accent-dark),var(--accent));transition:opacity 0.15s;margin-top:4px;}
.submit-btn:hover{opacity:0.9;}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="brand">
      <svg viewBox="0 0 24 24"><path d="M12 3L2 8l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      <span class="brand-name">EduLearn</span>
    </div>
    <div class="header-title">Set your password</div>
    <div class="header-sub">Your account uses a temporary password. Please choose a new one to continue.</div>
  </div>
  <div class="card-body">
    <div class="info-box">🔒 You're using a temporary password. Set a new password to access your account.</div>
    <div class="error-msg" id="errMsg"></div>
    <div class="form-group">
      <label class="form-label">Temporary password (current)</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" class="form-input" id="currentPass" placeholder="Your temporary password"/>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">New password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" class="form-input" id="newPass" placeholder="Min. 8 characters" oninput="checkStrength()"/>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill" style="width:0%"></div></div>
      <div class="strength-txt" id="strengthTxt"></div>
      <div class="rule-list">
        <div class="rule" id="r1"><svg viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>At least 8 characters</div>
        <div class="rule" id="r2"><svg viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>One uppercase letter</div>
        <div class="rule" id="r3"><svg viewBox="0 0 12 12"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>One number</div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm new password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" class="form-input" id="confirmPass" placeholder="Repeat new password" oninput="checkConfirm()"/>
      </div>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Set password &amp; continue →</button>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script>
// Allow access if token exists (even with mustChangePassword flag)
if (!getToken()) { window.location.href = '/login.html'; }

function checkStrength() {
  const v = document.getElementById('newPass').value;
  const has8 = v.length >= 8;
  const hasUpper = /[A-Z]/.test(v);
  const hasNum = /[0-9]/.test(v);
  const score = [has8, hasUpper, hasNum].filter(Boolean).length;
  const fill = document.getElementById('strengthFill');
  const txt = document.getElementById('strengthTxt');
  const pct = score === 0 ? 0 : score === 1 ? 33 : score === 2 ? 66 : 100;
  const colors = ['#ef4444','#f59e0b','#10b981'];
  const labels = ['Weak','Fair','Strong'];
  fill.style.width = pct + '%';
  fill.style.background = score > 0 ? colors[score-1] : '#ef4444';
  txt.textContent = score > 0 ? labels[score-1] : '';
  setRule('r1', has8); setRule('r2', hasUpper); setRule('r3', hasNum);
}

function setRule(id, ok) {
  const el = document.getElementById(id);
  el.classList.toggle('ok', ok);
  el.querySelector('svg').innerHTML = ok
    ? '<polyline points="2 6 5 9 10 3" stroke="currentColor" stroke-width="1.5" fill="none"/>'
    : '<circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5" fill="none"/>';
}

function checkConfirm() {
  const conf = document.getElementById('confirmPass');
  const match = conf.value === document.getElementById('newPass').value;
  conf.classList.toggle('error', conf.value.length > 0 && !match);
}

async function handleSubmit() {
  const current = document.getElementById('currentPass').value;
  const newPw = document.getElementById('newPass').value;
  const confirm = document.getElementById('confirmPass').value;
  const err = document.getElementById('errMsg');
  err.style.display = 'none';

  if (!current || !newPw || !confirm) { showError('Please fill in all fields.'); return; }
  if (newPw.length < 8) { showError('New password must be at least 8 characters.'); return; }
  if (!/[A-Z]/.test(newPw)) { showError('New password must contain at least one uppercase letter.'); return; }
  if (!/[0-9]/.test(newPw)) { showError('New password must contain at least one number.'); return; }
  if (newPw !== confirm) { showError('Passwords do not match.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    const r = await apiPut('/my/profile/password', { currentPassword: current, newPassword: newPw, confirmPassword: confirm });
    if (r?.status === 'success') {
      window.location.href = '/student/dashboard.html';
    } else {
      showError(r?.message || 'Failed to update password.');
    }
  } catch (e) {
    showError('Something went wrong. Please try again.');
  } finally {
    btn.disabled = false; btn.textContent = 'Set password & continue →';
  }
}

function showError(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg; el.style.display = 'block';
}
</script>
</body>
</html>
