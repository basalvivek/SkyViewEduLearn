# Server (localhost only)
server.port=8080
server.address=127.0.0.1

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/edulearn
spring.datasource.username=edulearn_user
spring.datasource.password=changeme
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=change-this-to-a-256-bit-random-string-in-production-at-least-32chars
app.jwt.expiration-ms=86400000

# Static resources
spring.web.resources.static-locations=classpath:/static/
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
app.upload.dir=uploads/org
app.upload.dir.avatars=uploads/avatars

# Logging
logging.level.root=WARN
logging.level.com.edulearn=INFO
